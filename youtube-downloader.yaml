name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'YouTube Video URL'
        required: true
        default: ''
      format:
        description: 'Format (mp4, mp3, etc.)'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mp3
          - best

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yt-dlp
        run: |
          python3 -m pip install --upgrade yt-dlp

      - name: Download Video
        run: |
          if [ "${{ github.event.inputs.format }}" == "mp3" ]; then
            yt-dlp -x --audio-format mp3 -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.url }}"
          elif [ "${{ github.event.inputs.format }}" == "mp4" ]; then
            yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.url }}"
          else
            yt-dlp -o "downloads/%(title)s.%(ext)s" "${{ github.event.inputs.url }}"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: downloads/
